    <style>
body {
    font-family: Arial, sans-serif;
    padding: 50px 2px 2px 2px;
    background-color: #ffffff;
    color: #000000;
    margin: 0;
}

.top-menu {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    background-color: #1a73e8;
    border-bottom: 1px solid #1a73e8;
    box-sizing: border-box;
    z-index: 1000;
    font-family: Arial, sans-serif;
    justify-content: flex-start;
    gap: 0;
}

.menu-search {
    border: none;
    background: transparent;
    color: #ffffff;
    font-size: 18px;
    line-height: 48px;
    height: 48px;
    width: 28px;
    cursor: pointer;
    padding: 0;
    margin-left: 14px;
    margin-right: 0;
}

.menu-toggle {
    display: none;
    border: none;
    background: transparent;
    color: #ffffff;
    font-size: 24px;
    line-height: 48px;
    height: 48px;
    width: 32px;
    cursor: pointer;
    padding: 0;
    margin-right: 10px;
}

.menu-brand {
    font-size: 16px;
    font-weight: 400;
    color: #ffffff;
    white-space: nowrap;
    line-height: 48px;
}

.menu-links {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 22px;
    height: 48px;
}

.menu-dropdown {
    position: relative;
    height: 48px;
    display: flex;
    align-items: center;
}

.menu-dropdown-toggle {
    border: none;
    background: transparent;
    color: #ffffff;
    font-size: 13px;
    font-weight: 500;
    height: 48px;
    line-height: 48px;
    padding: 0;
    cursor: pointer;
    border-bottom: 2px solid #ffffff;
    box-sizing: border-box;
}

.menu-dropdown-menu {
    display: none;
    position: absolute;
    top: 48px;
    left: 0;
    min-width: 300px;
    background: #ffffff;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
    z-index: 1300;
    padding: 6px 0;
}

.menu-dropdown.open .menu-dropdown-menu {
    display: block;
}

.menu-dropdown-menu a {
    color: #222 !important;
    display: block;
    height: auto;
    line-height: 1.4;
    padding: 10px 12px;
    border-bottom: none;
    font-size: 13px;
    text-decoration: none;
}

.menu-dropdown-menu a:hover {
    background: #f5f7fb;
}

.mobile-sidebar {
    display: none;
}

.mobile-overlay {
    display: none;
}

.top-menu a {
    color: #ffffff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    display: block;
    height: 48px;
    line-height: 48px;
    border-bottom: 2px solid transparent;
    box-sizing: border-box;
}

.top-menu a:visited {
    color: #ffffff;
    font-size: 13px;
    font-weight: 500;
}

.top-menu a:hover {
    color: #ffffff;
}

.top-menu a.active {
    color: #ffffff;
    border-bottom-color: #ffffff;
    font-size: 13px;
    font-weight: 500;
}

.top-menu a.active:visited {
    color: #ffffff;
}

.left-column {
    position: fixed;
    top: 48px;
    left: 0;
    width: 80px;
    height: calc(100vh - 48px);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    background-color: #f5f5f5;
    border-right: 1px solid #ccc;
    box-sizing: border-box;
}

.emoji-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding-top: 12px;
    height: 100%;
    overflow-y: auto;
    width: 100%;
}

.emoji-container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.emoji-container button {
    font-size: 32px;
    cursor: pointer;
    border: none;
    background: none;
    transition: transform 0.15s ease, filter 0.15s ease;
}

.emoji-container button:hover {
    transform: scale(1.08);
    filter: brightness(110%);
}

.emoji-label {

    font-size: 12px;

    word-wrap: break-word;
}

.snippet-column {
    margin-left: 80px;

.snippet {

    padding: 6px;

.snippet .label {

        // Utility functions (from utils.js)
function refreshSnippets(buttonId) {
    const column = document.getElementById('snippet-column');
    column.innerHTML = '';

    const data = snippetData[buttonId];
    if (!data) return;

    data.snippets.forEach((snippet, index) => {
        const snippetDiv = document.createElement('div');
        snippetDiv.className = 'snippet movement';

        const preId = `snippet-${buttonId}-${index}`;
        const pre = document.createElement('pre');
        pre.id = preId;
        pre.contentEditable = true;
        pre.style.display = 'none';

        // build the copy text: include function definition (if any), comment, then python body
        const parts = [];
        parts.push(snippet.textPython);
        pre.textContent = parts.join('\n') + '\n';

        //console.log(`BUILDING PRE HERE AS: ${pre.textContent}`);

        snippetDiv.appendChild(pre);

        const button = document.createElement('button');
        // emoji slightly larger via CSS class
        button.innerHTML = `<span class="emoji">${snippet.emoji}</span><span class="label">${snippet.buttonText}</span>`;
        button.style.backgroundColor = snippet.color;
        button.style.color = (buttonId === 4 || buttonId === 5 || buttonId === 6) ? '#000000' : '#ffffff';
        button.title = snippet.buttonText; // keep accessible label

        button.addEventListener('click', () => copySnippetWithLineInsert(preId));

        snippetDiv.appendChild(button);
        column.appendChild(snippetDiv);
    });
}

function copySnippetWithLineInsert(preId) {
    const el = document.getElementById(preId);
    if (!el) {
        console.warn(`copySnippetWithLineInsert: element with id ${preId} not found`);
        alert('Snippet not available to copy. Try clicking the left-column emoji to reload snippets.');
        return;
    }

    const text = el.textContent || '';

    // do not add additional indentation here; keep text as authored
    const textToCopy = text;

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(textToCopy).catch(() => fallbackCopy(textToCopy));
    } else {
        fallbackCopy(textToCopy);
    }
}

function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'absolute';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    try { document.execCommand('copy'); } catch (e) { console.error('fallback copy failed', e); }
    document.body.removeChild(textarea);
}

async function fetchGitHubRelease() {
    /**
     * Fetches the latest release information from the GitHub repository and updates the UI.
     * 
     * This function makes an API call to the GitHub releases endpoint to retrieve the latest
     * release data for the Spike-Editor repository. It updates the release-info element with
     * the fetched release name or falls back to a default version if the request fails.
     * 
     * @async
     * @function fetchGitHubRelease
     * @returns {Promise<void>} A promise that resolves when the release information has been fetched and displayed
     * @throws {Error} Throws an error if the GitHub API request fails or returns a non-ok response
     * 
     * @example
     * // Call the function to update release information
     * await fetchGitHubRelease();
     * 
     * @description
     * - Makes a GET request to 'https://api.github.com/repos/edking21/Spike-Editor/releases/latest'
     * - On success: Updates the 'release-info' element with "© 2025 Spike Editor - Release {release.name}"
     * - On failure: Falls back to "© 2025 Spike Editor - Release v1.0.0" and logs a warning
     * - Requires an HTML element with id 'release-info' to exist in the DOM
     */
    try {
        const response = await fetch('https://api.github.com/repos/edking21/Spike-Editor/releases/latest');
        if (response.ok) {
            const release = await response.json();
            const releaseInfo = document.getElementById('release-info');
            const releaseLabel = (release.name && release.name.trim()) ? release.name : release.tag_name;
            releaseInfo.textContent = `© Spike Editor - Release ${releaseLabel}`;
        } else {
            throw new Error('Failed to fetch release');
        }
    } catch (error) {
        console.warn('Could not fetch GitHub release:', error);
        const releaseInfo = document.getElementById('release-info');
        releaseInfo.textContent = '© Spike Editor - Release v1.0.0';
    }
}

(function (global) {

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');

    const ui = {
        toggleMobileMenu() { document.body.classList.toggle('mobile-menu-open'); },
        closeMobileMenu() { document.body.classList.remove('mobile-menu-open'); },
        searchCurrentPage() {
            const query = prompt('Search this page:');
            if (!query) return;
            const found = window.find(query, false, false, true, false, false, false);
            if (!found) alert(`No matches found for "${query}".`);
        },
        toggleDropdown(dropdownId, event) {
            if (event) event.stopPropagation();
            const dropdown = document.getElementById(dropdownId);
            if (!dropdown) return;
            const expanded = dropdown.classList.toggle('open');
            const btn = dropdown.querySelector('.menu-dropdown-toggle');
            if (btn) btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        },
        closeDropdown(dropdownId) {
            const dropdown = document.getElementById(dropdownId);
            if (!dropdown) return;
            dropdown.classList.remove('open');
            const btn = dropdown.querySelector('.menu-dropdown-toggle');
            if (btn) btn.setAttribute('aria-expanded', 'false');
        }
    };

    const renderers = {
        renderEmojiButtons({ containerId, buttons, onClickFnName }) {
            const host = document.getElementById(containerId);
            if (!host) return;
            host.innerHTML = (buttons || []).map(b => `
                <div class="emoji-container">
                    <button type="button"
                        class="color-circle ${b.className || ''}"
                        onclick="${onClickFnName}(${Number(b.id)})"></button>
                    <div class="emoji-label">${b.label || ''}</div>
                </div>
            `).join('');
        },
        renderSnippetButtons({ containerId, snippets }) {
            const host = document.getElementById(containerId);
            if (!host) return;

            const shown = new Set();

            const normalize = (v) =>
                String(v || '')
                    .toLowerCase()
                    .replace(/[^a-z0-9]+/g, ' ')
                    .trim();

            const sectionRules = [
                { key: 'motors', label: 'Motors', match: ['motor', 'motors'] },
                { key: 'movement', label: 'Movement', match: ['move', 'movement'] },
                { key: 'light', label: 'Light', match: ['light'] },
                { key: 'sound', label: 'Sound', match: ['sound', 'beep', 'audio'] },
                { key: 'events', label: 'Events', match: ['ev', 'event', 'events', 'when'] },
                { key: 'control', label: 'Control', match: ['ctrl', 'control', 'repeat', 'forever'] },
                { key: 'sensors', label: 'Sensors', match: ['sensor', 'fn', 'distance', 'color'] },
                { key: 'operators', label: 'Operators', match: ['op', 'operator', 'operators'] },
                { key: 'variables', label: 'Variables', match: ['var', 'variable', 'variables'] },
                { key: 'moremotors', label: 'More Motors', match: ['more motors', 'moremotors'] },
                { key: 'moremovement', label: 'More Movement', match: ['more movement', 'moremovement'] }
            ];

            function resolveSection(snippet) {
                const explicit = normalize(snippet?.section || snippet?.sectionLabel || snippet?.groupLabel);
                const id = normalize(snippet?.id);
                const idCompact = id.replace(/\s+/g, '');
                const text = normalize(snippet?.buttonText);

                // explicit section first
                if (explicit) {
                    const rule = sectionRules.find(r =>
                        normalize(r.label) === explicit || r.key === explicit.replace(/\s+/g, '')
                    );
                    if (rule) return rule;
                }

                // id prefix rules
                if (idCompact.startsWith('moremotors')) return sectionRules.find(r => r.key === 'moremotors');
                if (idCompact.startsWith('moremovement')) return sectionRules.find(r => r.key === 'moremovement');
                if (id.startsWith('motor')) return sectionRules.find(r => r.key === 'motors');
                if (id.startsWith('move')) return sectionRules.find(r => r.key === 'movement');
                if (id.startsWith('light')) return sectionRules.find(r => r.key === 'light');
                if (id.startsWith('sound')) return sectionRules.find(r => r.key === 'sound');
                if (id.startsWith('ev')) return sectionRules.find(r => r.key === 'events');
                if (id.startsWith('ctrl') || id.startsWith('control')) return sectionRules.find(r => r.key === 'control');
                if (id.startsWith('sensor') || id.startsWith('fn')) return sectionRules.find(r => r.key === 'sensors');
                if (id.startsWith('op')) return sectionRules.find(r => r.key === 'operators');
                if (id.startsWith('var')) return sectionRules.find(r => r.key === 'variables');

                // fallback text match
                return sectionRules.find(rule =>
                    rule.match.some(token =>
                        text.startsWith(token) || text.includes(` ${token}`) || id.includes(token)
                    )
                );
            }

            host.innerHTML = (snippets || []).map((snippet) => {
                const section = resolveSection(snippet);
                let labelHtml = '';

                if (section && !shown.has(section.key)) {
                    shown.add(section.key);
                    labelHtml = `<div class="snippet-group-label">${section.label}</div>`;
                }

                return `
                    ${labelHtml}
                    <div class="snippet">
                        <button type="button" style="background-color: ${snippet.color || '#666'}; color: ${snippet.textColor || '#fff'};">
                            <span class="emoji">${snippet.emoji || '🧿'}</span>
                            <span class="label">${snippet.buttonText || ''}</span>
                        </button>
                    </div>
                `;
            }).join('');
        }

    <script>
        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        const shared = window.SpikeShared || {};
        const ui = shared.ui || {};
        const renderers = shared.renderers || {};
        const snippetData = shared.snippetData || {};

        if (!shared.ui || !shared.renderers || !shared.snippetData) {
            console.error('SpikeShared not loaded correctly. Check ./scripts/spike-shared.js');
        }

        function toggleMobileMenu() { ui.toggleMobileMenu && ui.toggleMobileMenu(); }
        function closeMobileMenu() { ui.closeMobileMenu && ui.closeMobileMenu(); }
        function searchCurrentPage() { ui.searchCurrentPage && ui.searchCurrentPage(); }

        // Text color by snippet group number (left menu numbers)
        // Adjust values here only.
        const snippetTextColorByGroup = {
            1: '#ffffff', // Motors
            2: '#ffffff', // Movement
            3: '#ffffff', // Light
            4: '#ffffff', // Sound
            5: '#000000', // Events
            6: '#ffffff', // Control
            7: '#000000', // Sensors
            8: '#ffffff', // Operators
            9: '#ffffff', // Variables
            10: '#000000', // More Motors
            11: '#000000' // More Movement
        };

        function applyGroupTextColor(groupId, snippets) {
            const color = snippetTextColorByGroup[groupId] || '#000000';
            return (snippets || []).map(s => ({ ...s, textColor: s.textColor || color }));
        }

        function refreshSnippets(groupId) {
            const group = snippetData[groupId];
            renderers.renderSnippetButtons({
                containerId: 'snippet-column',
                snippets: applyGroupTextColor(groupId, group?.snippets || [])
            });
        }

        function renderAllSnippetGroups() {
            const order = [20];
            const combined = order.flatMap(id => applyGroupTextColor(id, snippetData[id]?.snippets || []));
            renderers.renderSnippetButtons({
                containerId: 'snippet-column',
                snippets: combined
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderAllSnippetGroups();
        });
    </script>
