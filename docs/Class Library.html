<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spike</title>
    <link rel="stylesheet" href="./styles/spike-shared.css">
</head>
<body>
    <div class="mobile-sidebar">
        <a href="/Spike-Editor/index.html" onclick="closeMobileMenu()">Home</a>
        <a href="/Spike-Editor/Training%20Camp.html" onclick="closeMobileMenu()">Training Camp</a>
        <a class="active" href="/Spike-Editor/Class%20Library.html" onclick="closeMobileMenu()">Class Library</a>
        <a href="/Spike-Editor/Videos.html" onclick="closeMobileMenu()">Videos</a>
    </div>
    <div class="mobile-overlay" onclick="closeMobileMenu()"></div>
    <div class="top-menu">
        <button class="menu-toggle" type="button" aria-label="Open menu" title="Open menu" onclick="toggleMobileMenu()">☰</button>
        <div class="menu-brand">Spike Editor</div>
        <div class="menu-links">
            <a href="/Spike-Editor/index.html">Home</a>
            <a href="/Spike-Editor/Training%20Camp.html">Training Camp</a>
            <a class="active" href="/Spike-Editor/Class%20Library.html">Class Library</a>
            <a href="/Spike-Editor/Videos.html">Videos</a>
        </div>
        <button class="menu-search" type="button" aria-label="Search this page" title="Search this page" onclick="searchCurrentPage()">&#128269;</button>
    </div>
    <div class="left-column">
        <div class="emoji-block">
            <div class="emoji-container"><button class="color-circle green-circle" onclick="refreshSnippets(1)"></button>
                <div class="emoji-label">Class</div>
            </div>
        </div>
    </div>
    <div class="snippet-column" id="snippet-column"></div>
    <script src="./utils/utils.js"></script>
    <script src="./scripts/spike-shared.js"></script>
    <script>
        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        const shared = window.SpikeShared || {};
        const ui = shared.ui || {};
        const renderers = shared.renderers || {};
        const snippetData = shared.snippetData || {};

        if (!shared.ui || !shared.renderers || !shared.snippetData) {
            console.error('SpikeShared not loaded correctly. Check ./scripts/spike-shared.js');
        }

        function toggleMobileMenu() { ui.toggleMobileMenu && ui.toggleMobileMenu(); }
        function closeMobileMenu() { ui.closeMobileMenu && ui.closeMobileMenu(); }
        function searchCurrentPage() { ui.searchCurrentPage && ui.searchCurrentPage(); }

        // Text color by snippet group number (left menu numbers)
        // Adjust values here only.
        const snippetTextColorByGroup = {
            1: '#ffffff', // Motors
            2: '#ffffff', // Movement
            3: '#ffffff', // Light
            4: '#ffffff', // Sound
            5: '#000000', // Events
            6: '#ffffff', // Control
            7: '#000000', // Sensors
            8: '#ffffff', // Operators
            9: '#ffffff', // Variables
            10: '#000000', // More Motors
            11: '#000000' // More Movement
        };

        function applyGroupTextColor(groupId, snippets) {
            const color = snippetTextColorByGroup[groupId] || '#000000';
            return (snippets || []).map(s => ({ ...s, textColor: s.textColor || color }));
        }

        function refreshSnippets(groupId) {
            const group = snippetData[groupId];
            renderers.renderSnippetButtons({
                containerId: 'snippet-column',
                snippets: applyGroupTextColor(groupId, group?.snippets || [])
            });
        }

        function renderAllSnippetGroups() {
            const order = [20];
            const combined = order.flatMap(id => applyGroupTextColor(id, snippetData[id]?.snippets || []));
            renderers.renderSnippetButtons({
                containerId: 'snippet-column',
                snippets: combined
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderAllSnippetGroups();
        });
    </script>
</body>
</html>
