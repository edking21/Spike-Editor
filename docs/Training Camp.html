<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spike</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 50px 2px 2px 2px;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
        }

        .top-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background-color: #1a73e8;
            border-bottom: 1px solid #1a73e8;
            box-sizing: border-box;
            z-index: 1000;
            font-family: Arial, sans-serif;
            justify-content: flex-start;
            gap: 0;
        }

        .menu-search {
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 18px;
            line-height: 48px;
            height: 48px;
            width: 28px;
            cursor: pointer;
            padding: 0;
            margin-left: 14px;
            margin-right: 0;
        }

        .menu-toggle {
            display: none;
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 24px;
            line-height: 48px;
            height: 48px;
            width: 32px;
            cursor: pointer;
            padding: 0;
            margin-right: 10px;
        }

        .menu-brand {
            font-size: 16px;
            font-weight: 400;
            color: #ffffff;
            white-space: nowrap;
            line-height: 48px;
        }

        .menu-links {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 22px;
            height: 48px;
        }

        .menu-dropdown {
            position: relative;
            height: 48px;
            display: flex;
            align-items: center;
        }

        .menu-dropdown-toggle {
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
            height: 48px;
            line-height: 48px;
            padding: 0;
            cursor: pointer;
            border-bottom: 2px solid #ffffff; /* active state */
            box-sizing: border-box;
        }

        .menu-dropdown-menu {
            display: none;
            position: absolute;
            top: 48px;
            left: 0;
            min-width: 300px;
            background: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
            z-index: 1300;
            padding: 6px 0;
        }

        .menu-dropdown.open .menu-dropdown-menu {
            display: block;
        }

        .menu-dropdown-menu a {
            color: #222 !important;
            display: block;
            height: auto;
            line-height: 1.4;
            padding: 10px 12px;
            border-bottom: none;
            font-size: 13px;
            text-decoration: none;
        }

        .menu-dropdown-menu a:hover {
            background: #f5f7fb;
        }

        .mobile-sidebar {
            display: none;
        }

        .mobile-overlay {
            display: none;
        }

        .top-menu a {
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: block;
            height: 48px;
            line-height: 48px;
            border-bottom: 2px solid transparent;
            box-sizing: border-box;
        }

        .top-menu a:visited {
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
        }

        .top-menu a:hover {
            color: #ffffff;
        }

        .top-menu a.active {
            color: #ffffff;
            border-bottom-color: #ffffff;
            font-size: 13px;
            font-weight: 500;
        }

        .top-menu a.active:visited {
            color: #ffffff;
        }

        .left-column {
            position: fixed;
            top: 48px;
            left: 0;
            width: 80px;
            height: calc(100vh - 48px);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-color: #f5f5f5;
            border-right: 1px solid #ccc;
            box-sizing: border-box;
        }

        .emoji-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding-top: 12px;
            height: 100%;
            overflow-y: auto;
            width: 100%;
        }

        .emoji-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .emoji-container button {
            font-size: 32px;
            cursor: pointer;
            border: none;
            background: none;
            transition: transform 0.15s ease, filter 0.15s ease;
        }

        .emoji-container button:hover {
            transform: scale(1.08);
            filter: brightness(110%);
        }

        .emoji-label {
            margin-top: 1px;
            font-size: 12px;
            color: black;
            text-align: center;
            width: 70px;
            word-wrap: break-word;
        }

        .snippet-column {
            margin-left: 80px;
            padding: 0px 12px 12px 12px;
        }

        .snippet {
            border: none;
            border-radius: 8px;
            padding: 6px;
            margin: 8px 0;
            background-color: transparent;
            width: 100%;
            box-sizing: border-box;
        }

        .snippet button {
            cursor: pointer;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            color: #ffffff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.12s ease, filter 0.12s ease;
        }

        .snippet button:hover {
            transform: scale(1.04);
            filter: brightness(110%);
        }

        .snippet .emoji {
            font-size: 1.3em;
            line-height: 1;
        }

        .snippet .label {
            font-size: 1em;
        }

        .release-info {
            text-align: center;
            margin-top: 400px;
            padding: 20px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
        }

        .emoji-container .color-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.15s ease;
            font-size: 0; /* Remove any text content */
        }

        .emoji-container .color-circle:hover {
            transform: scale(1.08);
            filter: brightness(110%);
        }

        .emoji-container .blue-circle { background-color: #0066FF !important; }
        .emoji-container .light-blue-circle { background-color: #87CEEB !important; }
        .emoji-container .red-circle { background-color: #CC0000 !important; }
        .emoji-container .pink-circle { background-color: #FF69B4 !important; }
        .emoji-container .purple-circle { background-color: #8A2BE2 !important; }
        .emoji-container .yellow-circle { background-color: #FFD700 !important; }
        .emoji-container .dark-yellow-circle { background-color: #DAA520 !important; }
        .emoji-container .green-circle { background-color: #32CD32 !important; }
        .emoji-container .orange-circle { background-color: #FF8C00 !important; }
        .emoji-container .dark-orange-circle { background-color: #FF6600 !important; }
        .emoji-container .light-purple-circle { background-color: #a564e1 !important; }

        @media (max-width: 500px) {
            .menu-toggle {
                display: block;
            }

            .menu-links {
                display: none;
            }

            .menu-search {
                margin-left: auto;
            }

            .mobile-sidebar {
                display: block;
                position: fixed;
                top: 48px;
                left: 0;
                width: 230px;
                height: calc(100vh - 48px);
                background-color: #1a73e8;
                transform: translateX(-100%);
                transition: transform 0.2s ease;
                z-index: 1200;
                padding-top: 8px;
            }

            .mobile-sidebar a {
                display: block;
                color: #ffffff;
                text-decoration: none;
                font-size: 14px;
                padding: 12px 16px;
            }

            .mobile-sidebar a.active {
                background-color: rgba(255, 255, 255, 0.18);
            }

            .mobile-overlay {
                display: block;
                position: fixed;
                top: 48px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.35);
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.2s ease;
                z-index: 1100;
            }

            body.mobile-menu-open .mobile-sidebar {
                transform: translateX(0);
            }

            body.mobile-menu-open .mobile-overlay {
                opacity: 1;
                visibility: visible;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-sidebar">
        <a href="/Spike-Editor/index.html" onclick="closeMobileMenu()">Home</a>
        <a class="active" href="/Spike-Editor/Training%20Camp.html" onclick="closeMobileMenu()">Training Camp</a>
        <a href="/Spike-Editor/Class%20Library.html" onclick="closeMobileMenu()">Class Library</a>
        <a href="/Spike-Editor/Videos.html" onclick="closeMobileMenu()">Videos</a>
    </div>
    <div class="mobile-overlay" onclick="closeMobileMenu()"></div>
    <div class="top-menu">
        <button class="menu-toggle" type="button" aria-label="Open menu" title="Open menu" onclick="toggleMobileMenu()">☰</button>
        <div class="menu-brand">Spike Editor</div>
        <div class="menu-links">
            <a href="/Spike-Editor/index.html">Home</a>

            <div class="menu-dropdown" id="training-camp-dropdown">
                <button
                    class="menu-dropdown-toggle"
                    type="button"
                    aria-haspopup="true"
                    aria-expanded="false"
                    onclick="toggleTrainingCampDropdown(event)">
                    Training Camp ▾
                </button>
                <div class="menu-dropdown-menu">
                    <a href="#" onclick="selectTrainingCamp('camp1', event)">Training Camp #1 Driving Arroung</a>
                    <a href="#" onclick="selectTrainingCamp('camp2', event)">Training Camp #2 Playing with Objects</a>
                    <a href="#" onclick="selectTrainingCamp('camp3', event)">Training Camp #3 Reacting to Lines</a>
                </div>
            </div>

            <a href="/Spike-Editor/Class%20Library.html">Class Library</a>
            <a href="/Spike-Editor/Videos.html">Videos</a>
        </div>
        <button class="menu-search" type="button" aria-label="Search this page" title="Search this page" onclick="searchCurrentPage()">&#128269;</button>
    </div>
    <div class="left-column">
        <div class="emoji-block" id="emoji-block">
            <!-- Dynamic emoji buttons go here -->
        </div>
    </div>
    <div class="snippet-column" id="snippet-column">
        <!-- Snippets will be dynamically inserted here -->
    </div>
    <div class="snippet-column">
        <div class="release-info" id="release-info">
            © 2026 Spike Editor - Loading release info...
        </div>
    </div>
    <script src="./utils/utils.js"></script>
    <script src="./scripts/spike-shared.js"></script>
    <script>
        const { ui, renderers, snippetData } = window.SpikeShared;

        function toggleMobileMenu() { ui.toggleMobileMenu(); }
        function closeMobileMenu() { ui.closeMobileMenu(); }
        function searchCurrentPage() { ui.searchCurrentPage(); }
        function toggleTrainingCampDropdown(event) { ui.toggleDropdown('training-camp-dropdown', event); }
        function closeTrainingCampDropdown()       { ui.closeDropdown('training-camp-dropdown'); }

        const CAMP1_COMBINED_ID = 2001;
        const CAMP2_COMBINED_ID = 1001;
        const CAMP3_COMBINED_ID = 3001;

        const trainingCampEmojiButtons = {
            camp1: [
                { id: CAMP1_COMBINED_ID, label: 'Movement', bubbleLabel: 'Camp1 snippets', className: 'pink-circle' },
                { id: 4, label: 'Events', bubbleLabel: 'Yellow Events bubble', className: 'yellow-circle' },
                { id: 5, label: 'Control', bubbleLabel: 'Dark Orange Control bubble', className: 'dark-yellow-circle' }
            ],
            camp2: [
                { id: CAMP2_COMBINED_ID, label: 'Motors', bubbleLabel: 'Blue Motors bubble', className: 'blue-circle' },
                { id: 2, label: 'Movement', bubbleLabel: 'Pink Movement bubble', className: 'pink-circle' },
                { id: 3, label: 'Sound', bubbleLabel: 'Purple Light bubble', className: 'purple-circle' },
                { id: 4, label: 'Events', bubbleLabel: 'Yellow Events bubble', className: 'yellow-circle' },
                { id: 5, label: 'Control', bubbleLabel: 'Dark Yellow Control bubble', className: 'dark-yellow-circle' }
            ],
            camp3: [
                { id: CAMP3_COMBINED_ID, label: 'Movement', bubbleLabel: 'Camp3 snippets', className: 'pink-circle' },
                { id: 3, label: 'Light', bubbleLabel: 'Purple Light bubble', className: 'purple-circle' },
                { id: 4, label: 'Events', bubbleLabel: 'Yellow Events bubble', className: 'yellow-circle' },
                { id: 5, label: 'Control', bubbleLabel: 'Dark Yellow Control bubble', className: 'dark-yellow-circle' },
                { id: 6, label: 'Sensors', bubbleLabel: 'Blue Sensors bubble', className: 'blue-circle' },
                { id: 7, label: 'Operators', bubbleLabel: 'Green Operators bubble', className: 'green-circle' },
                { id: 8, label: 'Hints', bubbleLabel: 'Red Hints bubble', className: 'red-circle' }
            ]
        };

        let currentSnippetData = {};

        function renderEmojiButtons(buttons) {
            renderers.renderEmojiButtons({
                containerId: 'emoji-block',
                buttons,
                onClickFnName: 'refreshSnippets'
            });
        }

        function refreshSnippets(groupId) {
            const group = currentSnippetData[groupId];
            renderers.renderSnippetButtons({
                containerId: 'snippet-column',
                snippets: group?.snippets || []
            });
        }

        function buildCampData(campKey) {
            currentSnippetData = {};

            Object.keys(snippetData).forEach(k => {
                currentSnippetData[k] = {
                    ...snippetData[k],
                    snippets: [...(snippetData[k].snippets || [])]
                };
            });

            // Undo previous Camp1 movement change: use first 7 movement snippets
            if (campKey === 'camp1') {
                const movement = (snippetData[2]?.snippets || []).slice(0, 7);
                const events = (snippetData[4]?.snippets || []).slice(0, 2);
                const control = (snippetData[5]?.snippets || []).slice(0, 2);

                currentSnippetData[CAMP1_COMBINED_ID] = {
                    colorClass: 'movement-color',
                    snippets: [...movement, ...events, ...control]
                };
            }

            if (campKey === 'camp2') {
                const motors = (snippetData[1]?.snippets || []).slice(0, 2);
                const movement = (snippetData[2]?.snippets || []).slice(0, 7);
                const sound = (snippetData[4]?.snippets || []).slice(0, 2);
                const events = (snippetData[5]?.snippets || []).slice(0, 2);
                const control = (snippetData[6]?.snippets || []).slice(0, 2);

                currentSnippetData[CAMP2_COMBINED_ID] = {
                    colorClass: 'motors-color',
                    snippets: [...motors, ...movement, ...sound, ...events, ...control]
                };
            }

            // Fix Camp3 movement slicing: pick 0..2 and 4..7
            if (campKey === 'camp3') {
                const movement = [
                    ...(snippetData[2]?.snippets || []).slice(0, 3),
                    ...(snippetData[2]?.snippets || []).slice(4, 8)
                ];
                const light = (snippetData[3]?.snippets || []).slice(0, 2);
                const events = (snippetData[4]?.snippets || []).slice(0, 2);
                const control = (snippetData[5]?.snippets || []).slice(0, 2);
                const sensors = (snippetData[6]?.snippets || []).slice(0, 2);
                const operators = (snippetData[7]?.snippets || []).slice(0, 2);

                currentSnippetData[CAMP3_COMBINED_ID] = {
                    colorClass: 'movement-color',
                    snippets: [...movement, ...light, ...events, ...control, ...sensors, ...operators]
                };
            }
        }

        function selectTrainingCamp(campKey, event) {
            if (event) event.preventDefault();

            const buttons = trainingCampEmojiButtons[campKey];
            if (!buttons) return;

            buildCampData(campKey);
            renderEmojiButtons(buttons);
            refreshSnippets(buttons[0].id);
            closeTrainingCampDropdown();
        }

        document.addEventListener('click', closeTrainingCampDropdown);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeMobileMenu();
                closeTrainingCampDropdown();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            selectTrainingCamp('camp1');
            if (typeof fetchGitHubRelease === 'function') fetchGitHubRelease();
        });
    </script>
</body>
</html>
