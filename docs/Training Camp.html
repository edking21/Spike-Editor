<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spike</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 50px 2px 2px 2px;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
        }

        .top-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background-color: #1a73e8;
            border-bottom: 1px solid #1a73e8;
            box-sizing: border-box;
            z-index: 1000;
            font-family: Arial, sans-serif;
            justify-content: flex-start;
            gap: 0;
        }

        .menu-search {
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 18px;
            line-height: 48px;
            height: 48px;
            width: 28px;
            cursor: pointer;
            padding: 0;
            margin-left: 14px;
            margin-right: 0;
        }

        .menu-toggle {
            display: none;
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 24px;
            line-height: 48px;
            height: 48px;
            width: 32px;
            cursor: pointer;
            padding: 0;
            margin-right: 10px;
        }

        .menu-brand {
            font-size: 16px;
            font-weight: 400;
            color: #ffffff;
            white-space: nowrap;
            line-height: 48px;
        }

        .menu-links {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 22px;
            height: 48px;
        }

        .menu-dropdown {
            position: relative;
            height: 48px;
            display: flex;
            align-items: center;
        }

        .menu-dropdown-toggle {
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
            height: 48px;
            line-height: 48px;
            padding: 0;
            cursor: pointer;
            border-bottom: 2px solid #ffffff; /* active state */
            box-sizing: border-box;
        }

        .menu-dropdown-menu {
            display: none;
            position: absolute;
            top: 48px;
            left: 0;
            min-width: 300px;
            background: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
            z-index: 1300;
            padding: 6px 0;
        }

        .menu-dropdown.open .menu-dropdown-menu {
            display: block;
        }

        .menu-dropdown-menu a {
            color: #222 !important;
            display: block;
            height: auto;
            line-height: 1.4;
            padding: 10px 12px;
            border-bottom: none;
            font-size: 13px;
            text-decoration: none;
        }

        .menu-dropdown-menu a:hover {
            background: #f5f7fb;
        }

        .mobile-sidebar {
            display: none;
        }

        .mobile-overlay {
            display: none;
        }

        .top-menu a {
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: block;
            height: 48px;
            line-height: 48px;
            border-bottom: 2px solid transparent;
            box-sizing: border-box;
        }

        .top-menu a:visited {
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
        }

        .top-menu a:hover {
            color: #ffffff;
        }

        .top-menu a.active {
            color: #ffffff;
            border-bottom-color: #ffffff;
            font-size: 13px;
            font-weight: 500;
        }

        .top-menu a.active:visited {
            color: #ffffff;
        }

        .left-column {
            position: fixed;
            top: 48px;
            left: 0;
            width: 80px;
            height: calc(100vh - 48px);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-color: #f5f5f5;
            border-right: 1px solid #ccc;
            box-sizing: border-box;
        }

        .emoji-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding-top: 12px;
            height: 100%;
            overflow-y: auto;
            width: 100%;
        }

        .emoji-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .emoji-container button {
            font-size: 32px;
            cursor: pointer;
            border: none;
            background: none;
            transition: transform 0.15s ease, filter 0.15s ease;
        }

        .emoji-container button:hover {
            transform: scale(1.08);
            filter: brightness(110%);
        }

        .emoji-label {
            margin-top: 1px;
            font-size: 12px;
            color: black;
            text-align: center;
            width: 70px;
            word-wrap: break-word;
        }

        .snippet-column {
            margin-left: 80px;
            padding: 0px 12px 12px 12px;
        }

        .snippet {
            border: none;
            border-radius: 8px;
            padding: 6px;
            margin: 8px 0;
            background-color: transparent;
            width: 100%;
            box-sizing: border-box;
        }

        .snippet button {
            cursor: pointer;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            color: #ffffff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.12s ease, filter 0.12s ease;
        }

        .snippet button:hover {
            transform: scale(1.04);
            filter: brightness(110%);
        }

        .snippet .emoji {
            font-size: 1.3em;
            line-height: 1;
        }

        .snippet .label {
            font-size: 1em;
        }

        .release-info {
            text-align: center;
            margin-top: 400px;
            padding: 20px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
        }

        .emoji-container .color-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.15s ease;
            font-size: 0; /* Remove any text content */
        }

        .emoji-container .color-circle:hover {
            transform: scale(1.08);
            filter: brightness(110%);
        }

        .emoji-container .blue-circle { background-color: #0066FF !important; }
        .emoji-container .light-blue-circle { background-color: #87CEEB !important; }
        .emoji-container .red-circle { background-color: #CC0000 !important; }
        .emoji-container .pink-circle { background-color: #FF69B4 !important; }
        .emoji-container .purple-circle { background-color: #8A2BE2 !important; }
        .emoji-container .yellow-circle { background-color: #FFD700 !important; }
        .emoji-container .dark-yellow-circle { background-color: #DAA520 !important; }
        .emoji-container .green-circle { background-color: #32CD32 !important; }
        .emoji-container .orange-circle { background-color: #FF8C00 !important; }
        .emoji-container .dark-orange-circle { background-color: #FF6600 !important; }

        @media (max-width: 500px) {
            .menu-toggle {
                display: block;
            }

            .menu-links {
                display: none;
            }

            .menu-search {
                margin-left: auto;
            }

            .mobile-sidebar {
                display: block;
                position: fixed;
                top: 48px;
                left: 0;
                width: 230px;
                height: calc(100vh - 48px);
                background-color: #1a73e8;
                transform: translateX(-100%);
                transition: transform 0.2s ease;
                z-index: 1200;
                padding-top: 8px;
            }

            .mobile-sidebar a {
                display: block;
                color: #ffffff;
                text-decoration: none;
                font-size: 14px;
                padding: 12px 16px;
            }

            .mobile-sidebar a.active {
                background-color: rgba(255, 255, 255, 0.18);
            }

            .mobile-overlay {
                display: block;
                position: fixed;
                top: 48px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.35);
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.2s ease;
                z-index: 1100;
            }

            body.mobile-menu-open .mobile-sidebar {
                transform: translateX(0);
            }

            body.mobile-menu-open .mobile-overlay {
                opacity: 1;
                visibility: visible;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-sidebar">
        <a href="/Spike-Editor/index.html" onclick="closeMobileMenu()">Home</a>
        <a class="active" href="/Spike-Editor/Training%20Camp.html" onclick="closeMobileMenu()">Training Camp</a>
        <a href="/Spike-Editor/Class%20Library.html" onclick="closeMobileMenu()">Class Library</a>
        <a href="/Spike-Editor/Videos.html" onclick="closeMobileMenu()">Videos</a>
    </div>
    <div class="mobile-overlay" onclick="closeMobileMenu()"></div>
    <div class="top-menu">
        <button class="menu-toggle" type="button" aria-label="Open menu" title="Open menu" onclick="toggleMobileMenu()">☰</button>
        <div class="menu-brand">Spike Editor</div>
        <div class="menu-links">
            <a href="/Spike-Editor/index.html">Home</a>

            <div class="menu-dropdown" id="training-camp-dropdown">
                <button
                    class="menu-dropdown-toggle"
                    type="button"
                    aria-haspopup="true"
                    aria-expanded="false"
                    onclick="toggleTrainingCampDropdown(event)">
                    Training Camp ▾
                </button>
                <div class="menu-dropdown-menu">
                    <a href="#" onclick="selectTrainingCamp('camp1', event)">Traiing Camp #1 Driving Arroung</a>
                    <a href="#" onclick="selectTrainingCamp('camp2', event)">Training Camp #2 Playing with Objects</a>
                    <a href="#" onclick="selectTrainingCamp('camp3', event)">Training Camp #3 Reacting to Lines</a>
                </div>
            </div>

            <a href="/Spike-Editor/Class%20Library.html">Class Library</a>
            <a href="/Spike-Editor/Videos.html">Videos</a>
        </div>
        <button class="menu-search" type="button" aria-label="Search this page" title="Search this page" onclick="searchCurrentPage()">&#128269;</button>
    </div>
    <div class="left-column">
        <div class="emoji-block" id="emoji-block">
            <!-- Dynamic emoji buttons go here -->
        </div>
    </div>
    <div class="snippet-column" id="snippet-column">
        <!-- Snippets will be dynamically inserted here -->
    </div>
    <div class="snippet-column">
        <div class="release-info" id="release-info">
            © 2026 Spike Editor - Loading release info...
        </div>
    </div>
    <script>
        function toggleMobileMenu() {
            document.body.classList.toggle('mobile-menu-open');
        }

        function closeMobileMenu() {
            document.body.classList.remove('mobile-menu-open');
        }

        const trainingCampEmojiButtons = {
            default: [
                { id: 1, label: 'Main', bubbleLabel: 'Purple Main bubble', className: 'purple-circle' }
            ],
            camp1: [
                { id: 1, label: 'Movement', bubbleLabel: 'Pink Movement bubble', className: 'pink-circle' },
                { id: 2, label: 'Events', bubbleLabel: 'Orange Events bubble', className: 'orange-circle' },
                { id: 3, label: 'Control', bubbleLabel: 'Dark Orange Control bubble', className: 'dark-orange-circle' },
                { id: 4, label: 'Sensors', bubbleLabel: 'Blue Sensors bubble', className: 'blue-circle' },
                { id: 5, label: 'Operators', bubbleLabel: 'Green Operators bubble', className: 'green-circle' }
            ],
            camp2: [
                { id: 1, label: 'Motors', bubbleLabel: 'Blue Motors bubble', className: 'blue-circle' },
                { id: 2, label: 'Movement', bubbleLabel: 'Pink Movement bubble', className: 'pink-circle' },
                { id: 3, label: 'Events', bubbleLabel: 'Orange Events bubble', className: 'orange-circle' },
                { id: 4, label: 'Control', bubbleLabel: 'Dark Orange Control bubble', className: 'dark-orange-circle' },
                { id: 5, label: 'Sensors', bubbleLabel: 'Blue Sensors bubble', className: 'blue-circle' },
                { id: 6, label: 'Operators', bubbleLabel: 'Green Operators bubble', className: 'green-circle' }
            ],
            camp3: [
                { id: 1, label: 'Movement', bubbleLabel: 'Pink Movement bubble', className: 'pink-circle' },
                { id: 2, label: 'Light', bubbleLabel: 'Purple Light bubble', className: 'purple-circle' },
                { id: 3, label: 'Events', bubbleLabel: 'Orange Events bubble', className: 'orange-circle' },
                { id: 4, label: 'Control', bubbleLabel: 'Dark Orange Control bubble', className: 'dark-orange-circle' },
                { id: 5, label: 'Sensors', bubbleLabel: 'Blue Sensors bubble', className: 'blue-circle' },
                { id: 6, label: 'Operators', bubbleLabel: 'Green Operators bubble', className: 'green-circle' },
                { id: 7, label: 'Variables', bubbleLabel: 'Orange Variables bubble', className: 'orange-circle' },
                { id: 8, label: 'More Motors', bubbleLabel: 'Blue More Motors bubble', className: 'blue-circle' },
                { id: 9, label: 'More Movement', bubbleLabel: 'Pink Move Movement bubble', className: 'pink-circle' }
            ]
        };

        function renderEmojiButtons(buttons) {
            const emojiBlock = document.getElementById('emoji-block');
            if (!emojiBlock) return;

            emojiBlock.innerHTML = buttons.map(button => `
                <div class="emoji-container">
                    <button
                        type="button"
                        class="color-circle ${button.className}"
                        title="${button.bubbleLabel}"
                        aria-label="${button.bubbleLabel}"
                        onclick="refreshSnippets(${button.id})">
                </button>
                <div class="emoji-label">${button.label}</div>
            </div>
        `).join('');
        }

        function selectTrainingCamp(campKey, event) {
            event.preventDefault();
            renderEmojiButtons(trainingCampEmojiButtons[campKey] || trainingCampEmojiButtons.default);
            refreshSnippets(1);
            closeTrainingCampDropdown();
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeMobileMenu();
            }
        });

        function searchCurrentPage() {
            const query = prompt('Search this page:');
            if (!query) return;

            const found = window.find(query, false, false, true, false, false, false);
            if (!found) {
                alert(`No matches found for "${query}".`);
            }
        }

        function toggleTrainingCampDropdown(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('training-camp-dropdown');
            if (!dropdown) return;
            const expanded = dropdown.classList.toggle('open');
            const btn = dropdown.querySelector('.menu-dropdown-toggle');
            if (btn) btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        }

        function closeTrainingCampDropdown() {
            const dropdown = document.getElementById('training-camp-dropdown');
            if (!dropdown) return;
            dropdown.classList.remove('open');
            const btn = dropdown.querySelector('.menu-dropdown-toggle');
            if (btn) btn.setAttribute('aria-expanded', 'false');
        }

        document.addEventListener('click', closeTrainingCampDropdown);

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeMobileMenu();
                closeTrainingCampDropdown();
            }
        });

        const snippetData = {
            1: {  // Movement
                snippets: [
                    {

                {
                    id: "fn3",
                    buttonText: 'Line Follower Proportional (Main)',
                    emoji: '🧿',
                    color: '#8A2BE2',
                    textPython: `

        },
        2: { snippets: [] },  // Events
        3: { snippets: [] },  // Control
        4: { snippets: [] },  // Sensors

    };

    document.addEventListener('DOMContentLoaded', () => {
        renderEmojiButtons(trainingCampEmojiButtons.default);
        refreshSnippets(1);
