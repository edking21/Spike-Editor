<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spike Videos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 60px 20px 20px 20px;
            background-color: #ffffff;
            color: #000000;
        }

        .top-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            display: flex;
            align-items: center;
            gap: 22px;
            padding: 0 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            box-sizing: border-box;
            z-index: 1000;
        }

        .top-menu a {
            color: #5f6368;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            height: 48px;
            line-height: 48px;
            border-bottom: 2px solid transparent;
            box-sizing: border-box;
        }

        .top-menu a:hover {
            color: #202124;
        }

        .top-menu a.active {
            color: #1a73e8;
            border-bottom-color: #1a73e8;
        }

        h1 {
            margin-top: 0;
        }

        .intro {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            max-width: 1200px;
            margin-bottom: 16px;
            background-color: #fafafa;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            max-width: 1200px;
        }

        .video-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background-color: #ffffff;
        }

        .video-thumb {
            width: 100%;
            height: auto;
            display: block;
            background-color: #000;
        }

        .video-body {
            padding: 12px;
        }

        .video-title {
            margin: 0 0 8px 0;
            font-size: 16px;
            font-weight: bold;
        }

        .video-link {
            font-size: 14px;
            font-weight: bold;
            color: #0066FF;
            text-decoration: none;
        }

        .video-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="top-menu">
        <a href="/Spike-Editor/index.html">Home</a>
        <a href="/Spike-Editor/Training%20Camp.html">Training Camp</a>
        <a href="/Spike-Editor/Class%20Library.html">Class Library</a>
        <a class="active" href="/Spike-Editor/Videos.html">Videos</a>
    </div>
    <h1>Spike Editor Videos</h1>
    <div class="intro">
        <p>This page stores YouTube URLs in GitHub Pages and shows a thumbnail preview for each video.</p>
        <p>Update the <strong>videos</strong> list in this file to add or remove class videos.</p>
    </div>

    <div id="video-grid" class="video-grid"></div>

    <script>
        const videos = [
            {
                title: "Spike Prime Intro",
                url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
            },
            {
                title: "Spike Prime Intro",
                url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
            },
            {
                title: "Spike Prime Intro",
                url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
            },
            {
                title: "Spike Prime Intro",
                url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
            },
            {
                title: "Spike Prime Intro",
                url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
            },
            {
                title: "Spike Prime Intro",
                url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
            },
            {
                title: "Spike Prime Intro",
                url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
            },
            {
                title: "Line Follower Demo",
                url: "https://youtu.be/aqz-KE-bpKQ"
            }
        ];

        function getYouTubeId(url) {
            try {
                const parsed = new URL(url);
                if (parsed.hostname.includes("youtu.be")) {
                    return parsed.pathname.replace("/", "");
                }
                if (parsed.hostname.includes("youtube.com")) {
                    return parsed.searchParams.get("v");
                }
            } catch (error) {
                return null;
            }
            return null;
        }

        function renderVideos() {
            const grid = document.getElementById("video-grid");
            grid.innerHTML = "";

            videos.forEach((video) => {
                const videoId = getYouTubeId(video.url);
                if (!videoId) {
                    return;
                }

                const card = document.createElement("div");
                card.className = "video-card";

                const thumbLink = document.createElement("a");
                thumbLink.href = video.url;
                thumbLink.target = "_blank";
                thumbLink.rel = "noopener noreferrer";

                const thumb = document.createElement("img");
                thumb.className = "video-thumb";
                thumb.src = `https://img.youtube.com/vi/${videoId}/0.jpg`;
                thumb.alt = `${video.title} thumbnail`;

                thumbLink.appendChild(thumb);

                const body = document.createElement("div");
                body.className = "video-body";

                const title = document.createElement("p");
                title.className = "video-title";
                title.textContent = video.title;

                const link = document.createElement("a");
                link.className = "video-link";
                link.href = video.url;
                link.target = "_blank";
                link.rel = "noopener noreferrer";
                link.textContent = "Open on YouTube";

                body.appendChild(title);
                body.appendChild(link);

                card.appendChild(thumbLink);
                card.appendChild(body);

                grid.appendChild(card);
            });
        }

        renderVideos();
    </script>
</body>
</html>
