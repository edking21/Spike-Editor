<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spike</title>
    <link rel="stylesheet" href="./styles/spike-shared.css">
</head>
<body>   
    <div class="left-column">
        <div class="emoji-block">
            <div class="emoji-container"><button class="color-circle green-circle" onclick="refreshSnippets(1)"></button>
                <div class="emoji-label">Class</div>
            </div>
        </div>
    </div>
    <div class="snippet-column" id="snippet-column">
        <!-- Snippets will be dynamically inserted here -->
    </div>
    <div class="snippet-column">
        <div class="release-info" id="release-info">
            © 2026 Spike Editor - Loading release info...
        </div>
    </div>
    <script>
        function toggleMobileMenu() {
            document.body.classList.toggle('mobile-menu-open');
        }

        function closeMobileMenu() {
            document.body.classList.remove('mobile-menu-open');
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeMobileMenu();
            }
        });

        function searchCurrentPage() {
            const query = prompt('Search this page:');
            if (!query) return;

            const found = window.find(query, false, false, true, false, false, false);
            if (!found) {
                alert(`No matches found for "${query}".`);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            refreshSnippets(1);
            fetchGitHubRelease();
        });
    </script>
    <script src="./utils/utils.js"></script>
<script src="./scripts/spike-shared.js"></script>
</body>
</html>
