<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spike</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2px 2px 2px 2px;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
        }

        .top-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background-color: #1a73e8;
            border-bottom: 1px solid #1a73e8;
            box-sizing: border-box;
            z-index: 1000;
            font-family: Arial, sans-serif;
            justify-content: flex-start;
            gap: 0;
        }

        .menu-search {
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 18px;
            line-height: 48px;
            height: 48px;
            width: 28px;
            cursor: pointer;
            padding: 0;
            margin-left: 14px;
            margin-right: 0;
        }

        .menu-toggle {
            display: none;
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 24px;
            line-height: 48px;
            height: 48px;
            width: 32px;
            cursor: pointer;
            padding: 0;
            margin-right: 10px;
        }

        .menu-brand {
            font-size: 16px;
            font-weight: 400;
            color: #ffffff;
            white-space: nowrap;
            line-height: 48px;
        }

        .menu-links {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 22px;
            height: 48px;
        }

        .mobile-sidebar {
            display: none;
        }

        .mobile-overlay {
            display: none;
        }

        .top-menu a {
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: block;
            height: 48px;
            line-height: 48px;
            border-bottom: 2px solid transparent;
            box-sizing: border-box;
        }

        .top-menu a:visited {
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
        }

        .top-menu a:hover {
            color: #ffffff;
        }

        .top-menu a.active {
            color: #ffffff;
            border-bottom-color: #ffffff;
            font-size: 13px;
            font-weight: 500;
        }

        .top-menu a.active:visited {
            color: #ffffff;
        }

        .left-column {
            position: fixed;
            top: 0;
            left: 0;
            width: 80px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-color: #f5f5f5;
            border-right: 1px solid #ccc;
            box-sizing: border-box;
        }

        .emoji-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding-top: 12px;
            height: 100%;
            overflow-y: auto;
            width: 100%;
        }

        .emoji-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .emoji-container button {
            font-size: 32px;
            cursor: pointer;
            border: none;
            background: none;
            transition: transform 0.15s ease, filter 0.15s ease;
        }

        .emoji-container button:hover {
            transform: scale(1.08);
            filter: brightness(110%);
        }

        .emoji-label {
            margin-top: 1px;
            font-size: 12px;
            color: black;
            text-align: center;
            width: 70px;
            word-wrap: break-word;
        }

        .snippet-column {
            margin-left: 80px;
            padding: 0px 12px 12px 12px;
        }

        .snippet {
            border: none;
            border-radius: 8px;
            padding: 6px;
            margin: 8px 0;
            background-color: transparent;
            width: 100%;
            box-sizing: border-box;
        }

        .snippet button {
            cursor: pointer;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.12s ease, filter 0.12s ease;
        }

        .snippet button:hover {
            transform: scale(1.04);
            filter: brightness(110%);
        }

        .snippet .emoji {
            font-size: 1.3em;
            line-height: 1;
        }

        .snippet .label {
            font-size: 1em;
        }

        /* Color-specific text styling for snippets */
        .snippet button.motors-color { background-color: #0066FF; color: #ffffff; }
        .snippet button.movement-color { background-color: #FF69B4; color: #000000; }
        .snippet button.light-color { background-color: #8A2BE2; color: #ffffff; }
        .snippet button.events-color { background-color: #FFD700; color: #000000; }
        .snippet button.control-color { background-color: #DAA520; color: #ffffff; }
        .snippet button.sensors-color { background-color: #87CEEB; color: #000000; }
        .snippet button.operators-color { background-color: #32CD32; color: #000000; }
        .snippet button.hints-color { background-color: #CC0000; color: #ffffff; }
        .snippet button.debug-color { background-color: #8A2BE2; color: #ffffff; }

        .release-info {
            text-align: center;
            margin-top: 400px;
            padding: 20px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
        }

        .emoji-container .color-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.15s ease;
            font-size: 0; /* Remove any text content */
        }

        .emoji-container .color-circle:hover {
            transform: scale(1.08);
            filter: brightness(110%);
        }

        .emoji-container .blue-circle { background-color: #0066FF !important; }
        .emoji-container .light-blue-circle { background-color: #87CEEB !important; }
        .emoji-container .red-circle { background-color: #CC0000 !important; }
        .emoji-container .pink-circle { background-color: #FF69B4 !important; }
        .emoji-container .purple-circle { background-color: #8A2BE2 !important; }
        .emoji-container .yellow-circle { background-color: #FFD700 !important; }
        .emoji-container .dark-yellow-circle { background-color: #DAA520 !important; }
        .emoji-container .green-circle { background-color: #32CD32 !important; }

        @media (max-width: 500px) {
            .menu-toggle {
                display: block;
            }

            .menu-links {
                display: none;
            }

            .menu-search {
                margin-left: auto;
            }

            .mobile-sidebar {
                display: block;
                position: fixed;
                top: 48px;
                left: 0;
                width: 230px;
                height: calc(100vh - 48px);
                background-color: #1a73e8;
                transform: translateX(-100%);
                transition: transform 0.2s ease;
                z-index: 1200;
                padding-top: 8px;
            }

            .mobile-sidebar a {
                display: block;
                color: #ffffff;
                text-decoration: none;
                font-size: 14px;
                padding: 12px 16px;
            }

            .mobile-sidebar a.active {
                background-color: rgba(255, 255, 255, 0.18);
            }

            .mobile-overlay {
                display: block;
                position: fixed;
                top: 48px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.35);
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.2s ease;
                z-index: 1100;
            }

            body.mobile-menu-open .mobile-sidebar {
                transform: translateX(0);
            }

            body.mobile-menu-open .mobile-overlay {
                opacity: 1;
                visibility: visible;
            }
        }
    </style>
</head>

import runloop, time, sys, motor_pair, motor, force_sensor, runloop 
import color, color_sensor, distance_sensor 
from hub import light, light_matrix, port, sound 
from time import sleep, sleep_ms
from runloop import run 

# Ports on the robot hub
color_port = port.A
distance_port = port.B
force_port = port.E

# Conversion constants
DEGREES_PER_CM = 21
DEGREES_PER_INCH = 53
MM_PER_INCH = 25.4

# how many times we see each color
blue_count = 0
yellow_count = 0
red_count = 0

# Color codes - these numbers represent different colors to the robot
blue = 3
yellow = 7
red = 9

# Connect two motors together so they work as a team
motor_pair.pair(motor_pair.PAIR_1, port.C, port.D)

# Remember the last color seen so we don't count the same color twice in a row
last_color = None

# This is like a stop sign for our program - when it's True, everything stops
should_stop = False

########################################################################
# 🛑 is_color_red - Function to check if the color sensor sees red
########################################################################
def is_color_red():
    """
    Examples:
        Using with if:              if is_color_red():
        Using with wait until:      await runloop.until(is_color_red)
        Using with repeat until:    while not (is_color_red())
    """
    return color_sensor.color(color_port) == color.RED

########################################################################
# 🎯 is_pressed - Function to check if force sensor is pressed
########################################################################
def is_pressed():
    """
    Examples:
        Using with if:              if is_pressed():
        Using with wait until:      await runloop.until(is_pressed)
        Using with repeat until:    while not (is_pressed())
    """
    return force_sensor.pressed(force_port)

########################################################################
# ☀️ is_near - Function to check if something is near
########################################################################
def is_near(distance_threshold=100): # 100mm (4 inches) threshold
    """
    Examples:
        Using with if:                  if is_near():
        Using with wait until           await runloop.until(is_near)
        Using with wait until           await runloop.until(lambda: is_near(200))
        Using with repeat until:        while is_near():
        Using with repeat until:        while is_near(200):  # 200mm (8 inches) threshold
    """
    distance = distance_sensor.distance(distance_port)

    if distance == -1:
        print("Warning: Distance sensor not detecting anything")
        return False

    print ("Distance {:5.2f} cm {:6.2f} inches ".format(distance / 10, distance / 25.4))
    
    return distance < distance_threshold

########################################################################
# 🤖 Main - Start and Stop is_near test using Wait until 
########################################################################
async def main():

    while True:

        # start moving
        motor_pair.move(motor_pair.PAIR_1, 0)

        # wait until condition
        await runloop.until (is_near)

        # stop moving
        motor_pair.stop(motor_pair.PAIR_1)
        sleep_ms(10) # Wait 10 milliseconds before checking again

runloop.run(main())
sys.exit()

`

    <script>
        // Utility functions (from utils.js)
        function refreshSnippets(buttonId) {
            const column = document.getElementById('snippet-column');
            column.innerHTML = '';
        
            const data = snippetData[buttonId];
            if (!data) return;
        
            data.snippets.forEach((snippet, index) => {
                const snippetDiv = document.createElement('div');
                snippetDiv.className = 'snippet movement';
        
                const preId = `snippet-${buttonId}-${index}`;
                const pre = document.createElement('pre');
                pre.id = preId;
                pre.contentEditable = true;
                pre.style.display = 'none';
        
                // build the copy text: include function definition (if any), comment, then python body
                const parts = [];
                parts.push(snippet.textPython);
                pre.textContent = parts.join('\n') + '\n';
        
                //console.log(`BUILDING PRE HERE AS: ${pre.textContent}`);
        
                snippetDiv.appendChild(pre);
        
                const button = document.createElement('button');
                // emoji slightly larger via CSS class
                button.innerHTML = `<span class="emoji">${snippet.emoji}</span><span class="label">${snippet.buttonText}</span>`;
                button.style.backgroundColor = snippet.color;
                button.style.color = (buttonId === 4 || buttonId === 5 || buttonId === 6) ? '#000000' : '#ffffff';
                button.title = snippet.buttonText; // keep accessible label
        
                button.addEventListener('click', () => copySnippetWithLineInsert(preId));
        
                snippetDiv.appendChild(button);
                column.appendChild(snippetDiv);
            });
        }
        
        function copySnippetWithLineInsert(preId) {
            const el = document.getElementById(preId);
            if (!el) {
                console.warn(`copySnippetWithLineInsert: element with id ${preId} not found`);
                alert('Snippet not available to copy. Try clicking the left-column emoji to reload snippets.');
                return;
            }
        
            const text = el.textContent || '';
        
            // do not add additional indentation here; keep text as authored
            const textToCopy = text;
        
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).catch(() => fallbackCopy(textToCopy));
            } else {
                fallbackCopy(textToCopy);
            }
        }
        
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'absolute';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try { document.execCommand('copy'); } catch (e) { console.error('fallback copy failed', e); }
            document.body.removeChild(textarea);
        }
        
        async function fetchGitHubRelease() {
            /**
             * Fetches the latest release information from the GitHub repository and updates the UI.
             * 
             * This function makes an API call to the GitHub releases endpoint to retrieve the latest
             * release data for the Spike-Editor repository. It updates the release-info element with
             * the fetched release name or falls back to a default version if the request fails.
             * 
             * @async
             * @function fetchGitHubRelease
             * @returns {Promise<void>} A promise that resolves when the release information has been fetched and displayed
             * @throws {Error} Throws an error if the GitHub API request fails or returns a non-ok response
             * 
             * @example
             * // Call the function to update release information
             * await fetchGitHubRelease();
             * 
             * @description
             * - Makes a GET request to 'https://api.github.com/repos/edking21/Spike-Editor/releases/latest'
             * - On success: Updates the 'release-info' element with "© 2025 Spike Editor - Release {release.name}"
             * - On failure: Falls back to "© 2025 Spike Editor - Release v1.0.0" and logs a warning
             * - Requires an HTML element with id 'release-info' to exist in the DOM
             */
            try {
                const response = await fetch('https://api.github.com/repos/edking21/Spike-Editor/releases/latest');
                if (response.ok) {
                    const release = await response.json();
                    const releaseInfo = document.getElementById('release-info');
                    const releaseLabel = (release.name && release.name.trim()) ? release.name : release.tag_name;
                    releaseInfo.textContent = `© Spike Editor - Release ${releaseLabel}`;
                } else {
                    throw new Error('Failed to fetch release');
                }
            } catch (error) {
                console.warn('Could not fetch GitHub release:', error);
                const releaseInfo = document.getElementById('release-info');
                releaseInfo.textContent = '© Spike Editor - Release v1.0.0';
            }
        }
        
    </script>
