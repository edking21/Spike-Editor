<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spike</title>
    <link rel="stylesheet" href="./styles/spike-shared.css">
</head>
<body>
    
    <div class="left-column">
        <div class="emoji-block" id="emoji-block">
            <!-- Dynamic emoji buttons go here -->
        </div>
    </div>
    <div class="snippet-column" id="snippet-column">
        <!-- Snippets will be dynamically inserted here -->
    </div>
    <div class="snippet-column">
        <div class="release-info" id="release-info">
            © 2026 Spike Editor - Loading release info...
        </div>
    </div>
    <script>
        // Utility functions (from utils.js)
        function refreshSnippets(buttonId) {
            const column = document.getElementById('snippet-column');
            column.innerHTML = '';
        
            const data = snippetData[buttonId];
            if (!data) return;
        
            data.snippets.forEach((snippet, index) => {
                const snippetDiv = document.createElement('div');
                snippetDiv.className = 'snippet movement';
        
                const preId = `snippet-${buttonId}-${index}`;
                const pre = document.createElement('pre');
                pre.id = preId;
                pre.contentEditable = true;
                pre.style.display = 'none';
        
                // build the copy text: include function definition (if any), comment, then python body
                const parts = [];
                parts.push(snippet.textPython);
                pre.textContent = parts.join('\n') + '\n';
        
                //console.log(`BUILDING PRE HERE AS: ${pre.textContent}`);
        
                snippetDiv.appendChild(pre);
        
                const button = document.createElement('button');
                // emoji slightly larger via CSS class
                button.innerHTML = `<span class="emoji">${snippet.emoji}</span><span class="label">${snippet.buttonText}</span>`;
                button.style.backgroundColor = snippet.color;
                button.style.color = (buttonId === 4 || buttonId === 5 || buttonId === 6) ? '#000000' : '#ffffff';
                button.title = snippet.buttonText; // keep accessible label
        
                button.addEventListener('click', () => copySnippetWithLineInsert(preId));
        
                snippetDiv.appendChild(button);
                column.appendChild(snippetDiv);
            });
        }
        
        function copySnippetWithLineInsert(preId) {
            const el = document.getElementById(preId);
            if (!el) {
                console.warn(`copySnippetWithLineInsert: element with id ${preId} not found`);
                alert('Snippet not available to copy. Try clicking the left-column emoji to reload snippets.');
                return;
            }
        
            const text = el.textContent || '';
        
            // do not add additional indentation here; keep text as authored
            const textToCopy = text;
        
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).catch(() => fallbackCopy(textToCopy));
            } else {
                fallbackCopy(textToCopy);
            }
        }
        
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'absolute';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try { document.execCommand('copy'); } catch (e) { console.error('fallback copy failed', e); }
            document.body.removeChild(textarea);
        }
        
        async function fetchGitHubRelease() {
            /**
             * Fetches the latest release information from the GitHub repository and updates the UI.
             * 
             * This function makes an API call to the GitHub releases endpoint to retrieve the latest
             * release data for the Spike-Editor repository. It updates the release-info element with
             * the fetched release name or falls back to a default version if the request fails.
             * 
             * @async
             * @function fetchGitHubRelease
             * @returns {Promise<void>} A promise that resolves when the release information has been fetched and displayed
             * @throws {Error} Throws an error if the GitHub API request fails or returns a non-ok response
             * 
             * @example
             * // Call the function to update release information
             * await fetchGitHubRelease();
             * 
             * @description
             * - Makes a GET request to 'https://api.github.com/repos/edking21/Spike-Editor/releases/latest'
             * - On success: Updates the 'release-info' element with "© 2025 Spike Editor - Release {release.name}"
             * - On failure: Falls back to "© 2025 Spike Editor - Release v1.0.0" and logs a warning
             * - Requires an HTML element with id 'release-info' to exist in the DOM
             */
            try {
                const response = await fetch('https://api.github.com/repos/edking21/Spike-Editor/releases/latest');
                if (response.ok) {
                    const release = await response.json();
                    const releaseInfo = document.getElementById('release-info');
                    const releaseLabel = (release.name && release.name.trim()) ? release.name : release.tag_name;
                    releaseInfo.textContent = `© Spike Editor - Release ${releaseLabel}`;
                } else {
                    throw new Error('Failed to fetch release');
                }
            } catch (error) {
                console.warn('Could not fetch GitHub release:', error);
                const releaseInfo = document.getElementById('release-info');
                releaseInfo.textContent = '© Spike Editor - Release v1.0.0';
            }
        }
        
    </script>
    <script src="./scripts/spike-shared.js"></script>
    <script>
        const shared = window.SpikeShared || {};
        const ui = shared.ui || {};
        const renderers = shared.renderers || {};
        const snippetData = shared.snippetData || {};

        if (!shared.ui || !shared.renderers || !shared.snippetData) {
            console.error('SpikeShared not loaded correctly. Check ./scripts/spike-shared.js export.');
        }

        function toggleMobileMenu() { ui.toggleMobileMenu && ui.toggleMobileMenu(); }
        function closeMobileMenu() { ui.closeMobileMenu && ui.closeMobileMenu(); }
        function searchCurrentPage() { ui.searchCurrentPage && ui.searchCurrentPage(); }
        function toggleTrainingCampDropdown(event) { ui.toggleDropdown && ui.toggleDropdown('training-camp-dropdown', event); }
        function closeTrainingCampDropdown() { ui.closeDropdown && ui.closeDropdown('training-camp-dropdown'); }

        const CAMP1_COMBINED_ID = 2001;
        const CAMP2_COMBINED_ID = 1001;
        const CAMP3_COMBINED_ID = 3001;

        const trainingCampEmojiButtons = {
            camp1: [
                { id: CAMP1_COMBINED_ID, label: 'Movement', bubbleLabel: 'Camp1 snippets', className: 'pink-circle' },
                { id: 5, label: 'Events', bubbleLabel: 'Yellow Events bubble', className: 'yellow-circle' },
                { id: 6, label: 'Control', bubbleLabel: 'Dark Orange Control bubble', className: 'dark-yellow-circle' },
                { id: 7, label: 'Sensors', bubbleLabel: 'Blue Sensors bubble', className: 'light-blue-circle' },
                { id: 8, label: 'Operators', bubbleLabel: 'Green Operators bubble', className: 'green-circle' },
            ],
            camp2: [
                { id: CAMP2_COMBINED_ID, label: 'Motors', bubbleLabel: 'Blue Motors bubble', className: 'blue-circle' },
                { id: 2, label: 'Movement', bubbleLabel: 'Pink Movement bubble', className: 'pink-circle' },
                { id: 4, label: 'Sound', bubbleLabel: 'Purple Light bubble', className: 'purple-circle' },
                { id: 5, label: 'Events', bubbleLabel: 'Yellow Events bubble', className: 'yellow-circle' },
                { id: 6, label: 'Control', bubbleLabel: 'Dark Yellow Control bubble', className: 'dark-yellow-circle' }
            ],
            camp3: [
                { id: CAMP3_COMBINED_ID, label: 'Movement', bubbleLabel: 'Camp3 snippets', className: 'pink-circle' },
                { id: 3, label: 'Light', bubbleLabel: 'Purple Light bubble', className: 'purple-circle' },
                { id: 5, label: 'Events', bubbleLabel: 'Yellow Events bubble', className: 'yellow-circle' },
                { id: 6, label: 'Control', bubbleLabel: 'Dark Yellow Control bubble', className: 'dark-yellow-circle' },
                { id: 7, label: 'Sensors', bubbleLabel: 'Blue Sensors bubble', className: 'light-blue-circle' },
                { id: 8, label: 'Operators', bubbleLabel: 'Green Operators bubble', className: 'green-circle' },
                { id: 9, label: 'Variables', bubbleLabel: 'Orange Variables bubble', className: 'orange-circle' },
                { id: 10, label: 'More Motors', bubbleLabel: 'Blue More Motors bubble', className: 'blue-circle' },
                { id: 11, label: 'More Movement', bubbleLabel: 'Pink Move Movement bubble', className: 'pink-circle' }
            ]
        };

        let currentSnippetData = {};

        function renderEmojiButtons(buttons) {
            renderers.renderEmojiButtons({
                containerId: 'emoji-block',
                buttons,
                onClickFnName: 'refreshSnippets'
            });
        }

        function refreshSnippets(groupId) {
            const group = currentSnippetData[groupId];
            renderers.renderSnippetButtons({
                containerId: 'snippet-column',
                snippets: group?.snippets || []
            });
        }

        function buildCampData(campKey) {
            currentSnippetData = {};

            Object.keys(snippetData).forEach(k => {
                currentSnippetData[k] = {
                    ...snippetData[k],
                    snippets: [...(snippetData[k].snippets || [])]
                };
            });

            if (campKey === 'camp1') {
                const movement = (snippetData[2]?.snippets || []).slice(0, 7);
                const events = (snippetData[5]?.snippets || []).slice(0, 2);
                const control = (snippetData[6]?.snippets || []).slice(0, 2);
                const sensors = (snippetData[7]?.snippets || []).slice(0, 2);
                const operators = (snippetData[8]?.snippets || []).slice(0, 2);

                currentSnippetData[CAMP1_COMBINED_ID] = {
                    colorClass: 'movement-color',
                    snippets: [...movement, ...events, ...control, ...sensors, ...operators]
                };
            }

            if (campKey === 'camp2') {
                const motors = (snippetData[1]?.snippets || []).slice(0, 2);
                const movement = (snippetData[2]?.snippets || []).slice(0, 7);
                const sound = (snippetData[4]?.snippets || []).slice(0, 2);
                const events = (snippetData[5]?.snippets || []).slice(0, 2);
                const control = (snippetData[6]?.snippets || []).slice(0, 2);

                currentSnippetData[CAMP2_COMBINED_ID] = {
                    colorClass: 'motors-color',
                    snippets: [...motors, ...movement, ...sound, ...events, ...control]
                };
            }

            if (campKey === 'camp3') {
                const movement = [
                    ...(snippetData[2]?.snippets || []).slice(0, 3),
                    ...(snippetData[2]?.snippets || []).slice(4, 8)
                ];
                const light = (snippetData[3]?.snippets || []).slice(0, 2);
                const events = (snippetData[5]?.snippets || []).slice(0, 2);
                const control = (snippetData[6]?.snippets || []).slice(0, 2);
                const sensors = (snippetData[7]?.snippets || []).slice(0, 2);
                const operators = (snippetData[8]?.snippets || []).slice(0, 2);
                const variables = (snippetData[9]?.snippets || []).slice(0, 2);
                const moreMotors = (snippetData[10]?.snippets || []).slice(0, 2);
                const moreMovement = (snippetData[11]?.snippets || []).slice(0, 2);

                currentSnippetData[CAMP3_COMBINED_ID] = {
                    colorClass: 'movement-color',
                    snippets: [
                        ...movement,
                        ...light,
                        ...events,
                        ...control,
                        ...sensors,
                        ...operators,
                        ...variables,
                        ...moreMotors,
                        ...moreMovement
                    ]
                };
            }
        }

        function selectTrainingCamp(campKey, event) {
            if (event) event.preventDefault();

            const buttons = trainingCampEmojiButtons[campKey];
            if (!buttons) return;

            buildCampData(campKey);
            renderEmojiButtons(buttons);
            refreshSnippets(buttons[0].id);
            closeTrainingCampDropdown();
        }

        document.addEventListener('click', closeTrainingCampDropdown);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeMobileMenu();
                closeTrainingCampDropdown();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            selectTrainingCamp('camp1');
            if (typeof fetchGitHubRelease === 'function') fetchGitHubRelease();
        });
    </script>
</body>
</html>
